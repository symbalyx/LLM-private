# Symbalyx Assistant IA — mémoire longue, HTML et patchs

Ce bot Matrix reste local : il utilise Synapse + Matrix E2E + Ollama.

## Ce qui a été ajouté

- Mémoire long terme en Markdown, lisible comme un vault Obsidian.
- Index `index.jsonl` pour rechercher vite.
- Mémoire automatique des décisions/projets/bugs importants.
- Commandes `!remember`, `!recall`, `!learn`, `!feedback`, `!obsidian`.
- Génération de fichiers `.html` propres via `!html`.
- Diagnostic et patch de bugs via `!patch`.
- Persona `devweb` pour HTML/CSS/JS/debug.

## Où sont les fichiers

Dans le volume Docker :

```txt
matrix/data/assistant_bot/
  store/          # store Matrix nio + state court
  memory/         # vault Markdown long terme
  generated/
    html/         # fichiers HTML générés
    patches/      # patchs/debugs sauvegardés
```

## Commandes

```txt
!help
!persona devweb
!remember <info durable>
!recall <recherche>
!memories 10
!learn <règle réutilisable>
!feedback <correction à retenir>
!html <brief de page/site>
!patch <erreur console ou code>
!summary 50
!forget
```

## Exemples

```txt
!learn Quand Arsène demande un site, préserver l'existant et patcher précisément au lieu de repartir de zéro.

!html page d'accueil premium pour tatoueur blackwork, mobile-first, galerie, CTA réservation

!patch Uncaught ReferenceError: markMissing is not defined
```

## Limite honnête

Le bot ne réentraîne pas les poids du modèle Ollama. Il "s'améliore" parce qu'il conserve des règles, décisions, bugs et préférences dans un vault local, puis les réinjecte dans le contexte des prochaines réponses.
