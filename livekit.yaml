# Symbalyx Matrix — UI v4 hard patch

Cette version corrige le vrai problème vu à l'écran : le chat central était encore Element Web dans une iframe. La surcouche précédente modifiait surtout l'extérieur, mais l'intérieur de l'iframe restait fade.

Le patch ajoute une injection contrôlée dans le conteneur Element :

- `element/nginx.conf` injecte `symbalyx-element-ui.css` et `symbalyx-element-ui.js` dans Element Web.
- `element/symbalyx-element-ui.css` applique un skin plus premium : sidebar, header, timeline, composer, avatars.
- `element/symbalyx-element-ui.js` ajoute un panneau visible `Bots IA` dans Element avec Dev Web, Debug, Mémoire et Résumé.

Après application :

```powershell
docker compose down
docker compose up -d --build --force-recreate
```

Puis ouvrir en navigation privée ou vider le cache :

```txt
http://localhost:8090
```

Si le bot n'apparaît pas, lancer le profil IA :

```powershell
docker compose --profile ia up -d --build assistant_bot
```
