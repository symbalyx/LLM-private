# Symbalyx normal chat v5

Cette version retire l’iframe Element du centre : l’interface affiche des chats simples et un seul chat IA nommé **Mon IA**.

## Démarrage propre Windows

```powershell
cd C:\Users\maxva\LLM-private\matrix
.\scripts\reset-stable.ps1
```

Puis ouvrir : http://localhost:8090

## IA locale

Le chat **Mon IA** utilise Ollama via `/ollama/api/chat`. Si l’IA ne répond pas :

```powershell
docker exec symbalyx_ollama ollama pull llama3.2:3b
```

Commandes IA : `/remember`, `/recall`, `/html`, `/patch`.

## Corrections incluses

- Suppression du bloc `email:` qui faisait planter Synapse.
- Suppression du skin Element injecté qui faisait redémarrer Element.
- UI simple sans iframe Element, sans appels vidéo visibles, sans faux panneau IA partout.
