# =====================================================================
#  Caddy reverse proxy — Symbalyx
#  Mutualise tous les services sous un seul origin HTTPS.
#  Bénéfices :
#    - HTTPS (TLS via mkcert) → mot de passe non sniffable sur le LAN
#    - Single-origin → annihilate() peut wipe les IndexedDB d'Element
#    - Element Web et Synapse ne sont plus exposés sur leurs ports natifs
#    - Headers de sécurité partagés (Referrer-Policy, X-Frame-Options...)
#
#  Routes :
#    /                 → UI Symbalyx (custom)
#    /element/*        → Element Web
#    /call/*           → Element Call
#    /_matrix/*        → Synapse (API + media + .well-known)
#    /_synapse/*       → Synapse admin (depuis localhost uniquement)
#    /livekit/*        → LiveKit signaling
#    /lk-jwt/*         → lk-jwt-service
#    /whisper/*        → Whisper ASR
#    /wipe             → renvoie Clear-Site-Data: * (effacement global)
# =====================================================================

{
    # Désactive les logs d'accès (vie privée)
    log {
        output discard
    }
    auto_https off
    servers {
        protocols h1 h2
    }
}

# ⚠ Remplacez l'IP par celle de votre PC pour l'accès LAN/mobile.
# Pour usage purement localhost, gardez "localhost".
https://localhost:8443, https://symbalyx.local:8443 {
    # Certificats mkcert (générés à l'étape HTTPS du README).
    tls /certs/cert.pem /certs/key.pem

    # Headers de sécurité globaux
    header {
        Referrer-Policy "no-referrer"
        X-Content-Type-Options "nosniff"
        X-Frame-Options "SAMEORIGIN"
        Permissions-Policy "geolocation=(), payment=(), usb=()"
        # CSP en report-only pour ne rien casser; durcir plus tard.
        Content-Security-Policy-Report-Only "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' wss: ws:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-src 'self'; worker-src 'self' blob:;"
        # Retire le header Server
        -Server
    }

    # ===== Effacement global (Clear-Site-Data) =====
    @wipe path /wipe
    handle @wipe {
        header Clear-Site-Data "\"cache\", \"cookies\", \"storage\", \"executionContexts\""
        respond "Wiped" 200
    }

    # ===== Synapse (Matrix client-server + media + well-known) =====
    handle_path /_matrix/* {
        rewrite * /_matrix{uri}
        reverse_proxy synapse:8008
    }
    handle /.well-known/matrix/* {
        reverse_proxy synapse:8008
    }
    # Admin Synapse limité à localhost
    @synapse_admin {
        path /_synapse/admin/*
        not remote_ip 127.0.0.1/32
    }
    respond @synapse_admin 403
    handle_path /_synapse/* {
        rewrite * /_synapse{uri}
        reverse_proxy synapse:8008
    }

    # ===== Element Web =====
    handle_path /element/* {
        reverse_proxy element:80
    }

    # ===== Element Call =====
    handle_path /call/* {
        reverse_proxy element-call:8080
    }

    # ===== LiveKit signaling (WebSocket) =====
    handle_path /livekit/* {
        reverse_proxy host.docker.internal:7880
    }

    # ===== lk-jwt-service =====
    handle_path /lk-jwt/* {
        reverse_proxy lk-jwt-service:8881
    }

    # ===== Whisper ASR =====
    handle_path /whisper/* {
        reverse_proxy whisper:9000
    }

    # ===== UI Symbalyx (catch-all, en dernier) =====
    handle {
        reverse_proxy ui:80
    }
}
