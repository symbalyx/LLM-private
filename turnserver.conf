# ============================================================
#  LiveKit SFU — Symbalyx
#  Tourne en host network. Signaling sur 7880, TCP RTC 7881,
#  UDP RTC 7882. Pas d'exposition Internet.
# ============================================================

port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

keys:
  symbalyx_lk_key: symbalyx_lk_secret_change_me_min_32_chars

logging:
  level: info
  json: false

room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
    - mime: video/h264
    - mime: video/vp9
    - mime: video/av1
  empty_timeout: 300
  max_participants: 0
